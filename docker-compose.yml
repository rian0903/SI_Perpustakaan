services:
  # NestJS Backend API Service (SQLite Database + File Uploads)
  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    restart: always
    environment:
      DATABASE_URL: "file:./dev.db"
      PORT: 3001
      JWT_SECRET: "super-secret-jwt-key-change-in-production"
      JWT_EXPIRATION: "1d"
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    volumes:
      - sqlite-data:/app/backend/prisma
      - backend-uploads:/app/backend/uploads
    networks:
      - library-network

  # Next.js Frontend Web Application Service
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "/api"
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - library-network

  # Nginx Reverse Proxy (Main Entry Point)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - library-network

volumes:
  sqlite-data:
    driver: local
  backend-uploads:
    driver: local

networks:
  library-network:
    driver: bridge
