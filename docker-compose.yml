services:
  # PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: digital_book_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - library-network

  # NestJS Backend API Service
  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    restart: always
    environment:
      DATABASE_URL: "file:./prisma/dev.db"
      PORT: 3001
      JWT_SECRET: "super-secret-jwt-key-change-in-production"
      JWT_EXPIRATION: "1d"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "3001:3001"
  volumes:
    - ./backend/prisma:/app/backend/prisma
    - backend-uploads:/app/backend/uploads
  networks:
      - library-network

  # Next.js Frontend Web Application Service
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001/api"
      PORT: 3000
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - library-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - library-network

volumes:
  pgdata:
    driver: local
  backend-uploads:
    driver: local

networks:
  library-network:
    driver: bridge
